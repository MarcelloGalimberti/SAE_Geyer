[theme]
primaryColor = "#1a5276"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[server]
# Dimensione massima upload in MB (per i file Excel)
maxUploadSize = 10
# Previene alcuni warning comuni
headless = true
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
